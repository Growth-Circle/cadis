name: Platform Baseline

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  macos-rust:
    name: macOS Rust full test
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust format
        run: cargo fmt --all --check
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Rust workspace tests
        run: cargo test --workspace --all-targets --all-features

  windows-rust:
    name: Windows portable crate baseline
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust clippy (portable crates)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Rust tests (portable crates)
        run: cargo test -p cadis-protocol -p cadis-policy -p cadis-models -p cadis-avatar -p cadis-memory -p cadis-output-filter --all-targets --all-features
