# CADIS desktop MVP config.
# This example is safe to commit and contains no credentials.
# Do not put API keys, Telegram tokens, auth headers, or private absolute paths here.
# Provider credentials must use environment variables or future keychain support.
# Copy relevant values to ~/.cadis/config.toml.

cadis_home = "~/.cadis"
log_level = "info"

# Leave unset to use:
# - $XDG_RUNTIME_DIR/cadis/cadisd.sock when XDG_RUNTIME_DIR exists
# - ~/.cadis/run/cadisd.sock otherwise
# socket_path = "~/.cadis/run/cadisd.sock"

[profile]
# cadisd initializes this profile under ~/.cadis/profiles/<profile>/ and keeps
# profile-local sessions, agents, workers, workspaces, event logs, and secrets
# separated from global daemon state.
# Daemon-known agents get non-destructive homes under agents/<agent>/ with
# AGENT.toml, POLICY.toml, instructions, memory, and skill policy templates.
default_profile = "default"

[model]
# auto tries Ollama first and falls back to the local credential-free provider.
# Use "openai" with OPENAI_API_KEY or CADIS_OPENAI_API_KEY for OpenAI.
# Use "codex-cli" after authenticating the official Codex CLI with `codex login`.
# Use "ollama" to require Ollama, or "echo" for explicit local fallback.
# Agent model selections may use "provider/model", for example "ollama/llama3.2".
provider = "auto"
ollama_model = "llama3.2"
ollama_endpoint = "http://127.0.0.1:11434"
openai_model = "gpt-5.2"
openai_base_url = "https://api.openai.com/v1"

[hud]
theme = "arc"
avatar_style = "orb"
background_opacity = 90
always_on_top = false

[voice]
enabled = false
voice_id = "id-ID-GadisNeural"
rate = 0
pitch = 0
volume = 0
auto_speak = false

[agent_spawn]
# Applies to client-requested agent.spawn and explicit orchestrator /worker actions.
max_depth = 2
max_children_per_parent = 4
max_total_agents = 32

[orchestrator]
# Enables explicit /worker, /spawn, /route, and /delegate message actions.
worker_delegation_enabled = true
default_worker_role = "Worker"
